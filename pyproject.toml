[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
  ".venv",
  "rpc/echo/v1/echo_pb2.py",
  "rpc/echo/v1/echo_pb2_grpc.py",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
files = ["hsp_execution_record_service"]
exclude = "rpc/echo/v1/.*_pb2.*"
ignore_missing_imports = true
check_untyped_defs = true
no_implicit_optional = true
warn_return_any = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = ["rpc.*"]
ignore_errors = true

[[tool.mypy.overrides]]
module = ["hsp_execution_record_service.transport.grpc.*"]
disable_error_code = ["attr-defined", "name-defined"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["hsp_execution_record_service"]
omit = [
  "*/__init__.py",
  "hsp_execution_record_service/main.py",
]

[tool.coverage.report]
fail_under = 70
show_missing = true
